name: rent-finder

on:
  schedule:
    # Every 4 hours UTC (12:00 AM, 4:00 AM, 8:00 AM, 12:00 PM, 4:00 PM, 8:00 PM UTC)
    # Toronto (EST/EDT): 7 PM, 11 PM, 3 AM, 7 AM, 11 AM, 3 PM
    - cron: '0 */4 * * *'
  workflow_dispatch:
    # Manual trigger button in GitHub Actions UI — useful for testing

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium browser
        run: playwright install --with-deps chromium

      - name: Restore SQLite database from cache
        uses: actions/cache/restore@v4
        with:
          path: data/rent_finder.db
          # Exact key won't match (new run_id each time), so restore-keys picks up the latest snapshot
          key: rentfinder-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            rentfinder-db-${{ runner.os }}-

      - name: Decode Facebook cookies from secret
        run: |
          mkdir -p data
          echo "${{ secrets.FB_COOKIES_B64 }}" | tr -d ' \r\n' | base64 -d --ignore-garbage > data/cookies.json

      - name: Sanitize secrets into environment
        run: |
          # Strip any accidental newlines/spaces from secrets before the pipeline uses them
          echo "OPENAI_API_KEY=$(echo '${{ secrets.OPENAI_API_KEY }}' | tr -d '\n\r ')" >> $GITHUB_ENV
          echo "TELEGRAM_BOT_TOKEN=$(echo '${{ secrets.TELEGRAM_BOT_TOKEN }}' | tr -d '\n\r ')" >> $GITHUB_ENV
          echo "TELEGRAM_CHAT_ID=$(echo '${{ secrets.TELEGRAM_CHAT_ID }}' | tr -d '\n\r ')" >> $GITHUB_ENV

      - name: Run rent-finder pipeline (live scrape)
        env:
          # ── Database ──────────────────────────────────────────────────────────
          DATABASE_PATH: data/rent_finder.db
          FACEBOOK_COOKIES_PATH: data/cookies.json
          # ── Scraper ───────────────────────────────────────────────────────────
          SCRAPER_MIN_DELAY_SECONDS: "4"
          SCRAPER_MAX_DELAY_SECONDS: "8"
          SCRAPER_MAX_LISTINGS_PER_RUN: "30"
          PLAYWRIGHT_HEADLESS: "true"
          PLAYWRIGHT_PAGE_TIMEOUT_MS: "30000"
          # ── Marketplace ───────────────────────────────────────────────────────
          MARKETPLACE_CITY: toronto
          MARKETPLACE_SEARCH_QUERY: apartment for rent
          MARKETPLACE_MIN_PRICE: "1000"
          MARKETPLACE_DAYS_SINCE_LISTED: "1"
          MARKETPLACE_MAX_SCROLL_PAGES: "10"
          MARKETPLACE_MAX_STALE_SCROLLS: "3"
          MARKETPLACE_MIN_DELAY_SECONDS: "6"
          MARKETPLACE_MAX_DELAY_SECONDS: "10"
          MARKETPLACE_MAX_AGE_HOURS: "8"
          # ── OpenAI ────────────────────────────────────────────────────────────
          # OPENAI_API_KEY is set by the "Sanitize secrets" step via $GITHUB_ENV
          OPENAI_MODEL: gpt-4o-mini
          OPENAI_MAX_TOKENS: "600"
          # ── Rental Criteria ───────────────────────────────────────────────────
          CRITERIA_MAX_RENT_CAD: "1600"
          CRITERIA_REQUIRE_PET_FRIENDLY: "false"
          CRITERIA_MIN_SCORE: "12"
          CRITERIA_MOVE_IN_DATE: "2026-04-01"
          # ── Telegram ─────────────────────────────────────────────────────────
          # TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID set by "Sanitize secrets" step
          TELEGRAM_SEND_SUMMARY: "true"
          TELEGRAM_REQUEST_TIMEOUT_SECONDS: "15"
          # ── Logging ───────────────────────────────────────────────────────────
          LOG_DIR: logs
          LOG_LEVEL_FILE: DEBUG
          LOG_LEVEL_CONSOLE: INFO
        run: python -m rent_finder.main --live

      - name: Save updated SQLite database to cache
        uses: actions/cache/save@v4
        # Always save the DB, even if the pipeline run failed partway through
        # (dedup entries for seen listings should be preserved)
        if: always()
        with:
          path: data/rent_finder.db
          # Unique key per run ensures this always writes (not skipped on cache hit)
          key: rentfinder-db-${{ runner.os }}-${{ github.run_id }}
